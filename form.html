<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran</title>
    <link rel="stylesheet" href="styles.css"> <!-- Tautan ke file CSS eksternal -->
</head>
<body>
    <form action="welcome.html" method="post">
        <h1>Buat Akun Baru</h1>
        <h2>Form Pendaftaran</h2>

        <label for="first_name">Nama depan:</label>
        <input type="text" id="first_name" name="first_name">

        <label for="last_name">Nama belakang:</label>
        <input type="text" id="last_name" name="last_name">

        <label>Jenis Kelamin:</label>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Laki-laki</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Perempuan</label>

        <label for="nationality">Kebangsaan:</label>
        <select id="nationality" name="nationality">
            <option value="Indonesia">Indonesia</option>
            <option value="Other">Lainnya</option>
        </select>

        <label>Bahasa yang Dikuasai:</label>
        <input type="checkbox" id="bahasa" name="language" value="Bahasa Indonesia">
        <label for="bahasa">Bahasa Indonesia</label>
        <input type="checkbox" id="english" name="language" value="English">
        <label for="english">Inggris</label>
        <input type="checkbox" id="other" name="language" value="Other">
        <label for="other">Lainnya</label>

        <label for="bio">Bio:</label>
        <textarea id="bio" name="bio" rows="5"></textarea>

        <input type="submit" value="Daftar">
    </form>
</body>
</html>
